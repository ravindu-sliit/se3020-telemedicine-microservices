apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service-deployment
  labels:
    app: telemedicine-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: telemedicine-service-image:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5008
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: telemedicine-service-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: telemedicine-service-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              value: "http://smart-healthcare.local"
            - name: PORT
              value: "5008"
            - name: JITSI_BASE_URL
              value: "https://meet.jit.si"
