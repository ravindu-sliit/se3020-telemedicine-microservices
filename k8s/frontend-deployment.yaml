apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: frontend-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_AI_API_URL
              value: http://smart-healthcare.local/api
            - name: REACT_APP_PAYMENT_API_URL
              value: http://smart-healthcare.local/api
            - name: REACT_APP_NOTIFICATION_API_URL
              value: http://smart-healthcare.local/api
