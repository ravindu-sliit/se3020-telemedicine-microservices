apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secrets
type: Opaque
stringData:
  EMAIL_USER: "replace-with-sender-email"
  EMAIL_APP_PASSWORD: "replace-with-email-app-password"
  EMAIL_PROVIDER: "auto"
  EMAIL_FROM: "replace-with-sender-email"
  SENDGRID_API_KEY: "replace-with-sendgrid-api-key"
  TWILIO_ACCOUNT_SID: "replace-with-twilio-account-sid"
  TWILIO_AUTH_TOKEN: "replace-with-twilio-auth-token"
  TWILIO_PHONE_NUMBER: "+10000000000"
